name: Package Check

on:
  pull_request:
    paths:
      - ".github/workflows/package-check.yml"
      - "README.md"
      - "docs/**"
      - "package-lock.json"
      - "package.json"
      - "src/**"
      - "tsconfig.json"
  push:
    branches: [main]
    paths:
      - ".github/workflows/package-check.yml"
      - "README.md"
      - "docs/**"
      - "package-lock.json"
      - "package.json"
      - "src/**"
      - "tsconfig.json"

permissions:
  contents: read

jobs:
  pack:
    name: Verify npm package contents
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package output
        run: npm run build

      - name: Dry-run package publish
        run: npm pack --dry-run
